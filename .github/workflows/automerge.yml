# Routines は claude/ プレフィックスのブランチにしかプッシュできないため、
# claude/** から来た PR を自動マージして GitHub Pages に反映させる。
# 中身を毎回レビューしたい場合はこのファイルを削除して手動マージにすればよい。
name: Auto-merge Claude PRs

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --repo "${{ github.repository }}"
