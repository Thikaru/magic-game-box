<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>リズム木魚道 — DAILY GAMES</title>
<style>
  :root { --wood:#5a3a24; --gold:#e8b84b; --paper:#fff8ea; --ink:#231a12; --bad:#ff6b6b; --good:#7fe0a0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif; background:linear-gradient(180deg,#2b1c10,#120c07); color:var(--paper); min-height:100vh; }
  .wrap { max-width:520px; margin:0 auto; padding:14px 12px 32px; }
  header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; }
  header a { color:var(--paper); text-decoration:none; font-size:.85rem; border-bottom:2px dotted var(--gold); }
  h1 { color:var(--gold); font-size:1.25rem; letter-spacing:.05em; }
  .stage { position:relative; }
  canvas { display:block; width:100%; border:4px solid var(--wood); border-radius:12px; background:#1b120a; touch-action:none; }
  .overlay { position:absolute; inset:4px; border-radius:8px; background:rgba(20,13,7,.94);
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; overflow-y:auto; }
  .overlay h2 { color:var(--gold); font-size:1.5rem; margin-bottom:12px; }
  .overlay p { line-height:1.8; font-size:.92rem; margin-bottom:8px; }
  .overlay .btn { margin-top:16px; font-size:1.1rem; font-weight:700; background:var(--gold);
    color:var(--ink); border:0; border-radius:10px; padding:12px 36px; box-shadow:0 5px 0 #9c7423; cursor:pointer; }
  .overlay .btn:active { transform:translateY(3px); box-shadow:0 2px 0 #9c7423; }
  .hidden { display:none; }
  .hud { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:baseline; gap:6px 10px; color:var(--gold); margin:10px 0; font-size:.85rem; }
  .hud b { color:var(--paper); }
  .pads { display:flex; gap:8px; }
  .pad { flex:1; height:64px; border-radius:12px; border:3px solid var(--wood); background:linear-gradient(180deg,#7a4f2e,#5a3a24);
    color:var(--paper); font-size:1.6rem; display:flex; align-items:center; justify-content:center;
    -webkit-tap-highlight-color:transparent; user-select:none; cursor:pointer; }
  .pad:active, .pad.pressed { background:linear-gradient(180deg,var(--gold),#c99a3a); color:var(--ink); transform:translateY(2px); }
  .padlabel { font-size:.7rem; display:block; text-align:center; margin-top:4px; opacity:.8; }
  .padcol { flex:1; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>リズム木魚道</h1>
    <a href="../../index.html">← トップへ</a>
  </header>

  <div class="stage">
    <canvas id="game" width="480" height="600"></canvas>

    <!-- 説明画面: ここから開始する(必須要件1) -->
    <div class="overlay" id="intro">
      <h2>しゅぎょうの心得</h2>
      <p>3つのレーンに音符が降ってくる。<br>
        木魚の音符🥁が判定ラインに来たら、そのレーンを叩こう。</p>
      <p>ただし居眠り小坊主😴の音符が来たら<b>ぜったいに叩いてはいけない</b>。<br>
        叩かずに見送れば「OK」で徳が貯まる。</p>
      <p>⌨ PC: A/S/D または ←↓→キー<br>👆 スマホ: 下の木魚パッドをタップ</p>
      <p>ハートが0になるか、修行時間(75秒)を耐えきるかで結果発表。</p>
      <button class="btn" id="startBtn">スタート</button>
    </div>

    <!-- リザルト画面: 何度でもやり直せる(必須要件2) -->
    <div class="overlay hidden" id="result">
      <h2 id="resultTitle"></h2>
      <p id="resultText"></p>
      <button class="btn" id="retryBtn">もういちど</button>
    </div>
  </div>

  <div class="hud">
    <span>SCORE <b id="scoreLabel">0</b></span>
    <span>COMBO <b id="comboLabel">0</b></span>
    <span id="livesLabel">❤️❤️❤️❤️</span>
    <span>残り<b id="timeLabel">75</b>秒</span>
  </div>

  <div class="pads">
    <div class="padcol">
      <div class="pad" id="pad0" data-lane="0">🥁</div>
      <span class="padlabel">左 (A/←)</span>
    </div>
    <div class="padcol">
      <div class="pad" id="pad1" data-lane="1">🥁</div>
      <span class="padlabel">中 (S/↓)</span>
    </div>
    <div class="padcol">
      <div class="pad" id="pad2" data-lane="2">🥁</div>
      <span class="padlabel">右 (D/→)</span>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
