<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>重力リバースラン — DAILY GAMES</title>
<style>
  :root { --bg1:#0c1a3a; --bg2:#050a1a; --panel:#101f47; --line:#2f5adb; --cyan:#4dd8ff; --gold:#ffd166; --danger:#ff5d5d; --safe:#6be6b0; --ink:#071022; --paper:#eaf2ff; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { overflow-x:hidden; }
  body { font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',system-ui,sans-serif; background:radial-gradient(circle at 50% 0%,var(--bg1),var(--bg2)); color:var(--paper); min-height:100vh; }
  .wrap { max-width:420px; margin:0 auto; padding:14px 12px 40px; }
  header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; }
  header a { color:var(--paper); text-decoration:none; font-size:.85rem; border-bottom:2px dotted var(--cyan); }
  h1 { color:var(--cyan); font-size:1.1rem; letter-spacing:.02em; }

  .stage { position:relative; border:3px solid var(--line); border-radius:14px; background:var(--panel); padding:10px; }

  .hud { display:flex; justify-content:space-between; align-items:center; font-size:.82rem; margin-bottom:8px; gap:6px; }
  .hud .lives { color:var(--danger); letter-spacing:2px; }
  .hud .score { color:var(--gold); font-weight:bold; }
  .hud .level { color:var(--safe); font-weight:bold; }

  canvas { display:block; width:100%; height:380px; border-radius:10px; background:#08122c; touch-action:manipulation; }

  .flashMsg { text-align:center; min-height:1.4em; font-weight:bold; font-size:1rem; margin-top:6px; }
  .flashMsg.ok { color:var(--safe); }
  .flashMsg.bonus { color:var(--gold); }
  .flashMsg.bad { color:var(--danger); }

  .footNote { text-align:center; font-size:.72rem; opacity:.65; margin-top:8px; }

  .overlay { position:absolute; inset:6px; border-radius:10px; background:rgba(5,10,26,.96);
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
  .overlay h2 { color:var(--cyan); font-size:1.35rem; margin-bottom:12px; }
  .overlay p { line-height:1.8; font-size:.87rem; margin-bottom:8px; }
  .overlay .btn { margin-top:16px; font-size:1.05rem; background:var(--cyan); color:var(--ink); border:0; border-radius:10px; padding:14px 36px; min-height:48px; box-shadow:0 5px 0 #2a8fc2; cursor:pointer; font-weight:bold; }
  .overlay .btn:active { transform:translateY(3px); box-shadow:0 2px 0 #2a8fc2; }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>重力リバースラン</h1>
    <a href="../../index.html">← トップへ</a>
  </header>

  <div class="stage">
    <div class="hud">
      <span class="lives" id="lives">♥♥♥</span>
      <span class="level" id="levelLabel">Lv.1</span>
      <span class="score" id="scoreLabel">SCORE 0</span>
    </div>

    <canvas id="game"></canvas>

    <div class="flashMsg" id="flashMsg"></div>

    <div class="footNote">タップ / クリック / Space・↑・↓ キーで重力反転</div>

    <!-- 説明画面: ここから開始する(必須要件1) -->
    <div class="overlay" id="intro">
      <h2>あそびかた</h2>
      <p>キャラは自動で右へ走り続ける。<b>タップ(または Space/↑/↓)</b>で<br>
        重力を反転させて、床↔天井を切りかえよう。</p>
      <p>床や天井から生えた<b style="color:#ff5d5d">トゲ</b>にぶつかるとライフが1減る。<br>
        反対側に切りかえて避けよう!</p>
      <p>時々あらわれる<b style="color:#ffd166">黄金のジェム</b>は、乗っている側と
        同じレールを通ると獲得。<br>連続で取るほどコンボボーナスが増える。</p>
      <p>ライフは3つ。スピードはだんだん速くなる。なくなったら終了。</p>
      <button class="btn" id="startBtn">スタート</button>
    </div>

    <!-- リザルト画面: 何度でもやり直せる(必須要件2) -->
    <div class="overlay hidden" id="result">
      <h2 id="resultTitle">ゲーム終了</h2>
      <p id="resultText"></p>
      <button class="btn" id="retryBtn">もういちど</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
